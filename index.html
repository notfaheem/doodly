<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodly</title>
    <link rel="shortcut icon" href="public/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Finger+Paint&family=Matemasie&family=Pacifico&family=Share+Tech&display=swap"
        rel="stylesheet">
</head>

<body>


    <nav>
        <img class="logo" src="public/logo.png">
        <div class="title">Doodly</div>
        <div></div>
        <a href="#" class="no">
            <div class="page active">Home</div>
        </a>
        <a href="#" class="no">
            <div class="page">About</div>
        </a>
        <a href="#" class="no">
            <div class="page">Contact</div>
        </a>
        <a href="#" class="no">
            <div class="page btn btn1">Enter the Game</div>
        </a>
    </nav>


    <section class="h-sec">

        <div class="bg bg-w"></div>
        <video class="bg-v" loop autoplay muted poster="public/bg.webp">
            <source src="public/bg.webm">
        </video>


        <div class="centerall card-container">
            <img class="doo-up" src="public/doo-up-tra.png">
            <div class="card">
                <h1>Doodly</h1>
                <p class="para1">Welcome to Doodly, a simple fun game where you can move around a tiny doodle world with Doo, and do some interesting stuff!</p>
                <div class="flex-c">
                    <a href="#" class="no"><div class="btn btn2">Enter the Game</div></a>
                    <a href="#" class="no"><div class="btn btn3">Know More</div></a>
                </div>
            </div>
        </div>

    </section>


</body>

</html>
