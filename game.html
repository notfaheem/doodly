<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodly - Game</title>
    <link rel="stylesheet" href="game_style.css">
</head>
<body>
    


    <video class="bg-v" loop autoplay muted poster="public/bg.webp">
        <source src="public/bg.webm">
    </video>

    <div class="bg bg-w"></div>



    <section>
        <div id="doo-container" class="doo-container">
            <div class="doo"></div>
            <div class="wheel wheel1"></div>
            <div class="wheel wheel2"></div>
        </div>

        
        <div class="centerall item item1" id="item1"> <!--Home-->
            <div class="i-img"></div>
            <div class="i-btn"></div>
        </div>
        
        <div class="centerall item item2" id="item2"> <!--Hos-->
            <div class="i-img"></div>
            <div class="i-btn"></div>
        </div>

        <div class="centerall item item3" id="item3">  <!--Shop-->
            <div class="i-img"></div>
            <div class="i-btn"></div>
        </div>

        <div class="centerall item item4" id="item4"> <!--schoo-->
            <div class="i-img"></div>
            <div class="i-btn"></div>
        </div>


        <div class="centerall item item5" id="item5"> <!--Cave-->
            <div class="i-img"></div>
            <div class="i-btn"></div>
        </div>

    </section>







    <script src="script_game.js"></script>
</body>
</html>
